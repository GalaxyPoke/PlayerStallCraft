Minecraft 摆摊与商铺系统完整策划案
一、 基础摆摊系统（流动摊位）
1. 区域限制与管理
管理员工具：手持 “下界合金锄”。
操作流程：左键点击选择区域高点（Pos1），右键点击选择区域低点（Pos2），输入 /baitan region 确认保存。
限制规则：只有在管理员设定的区域内，玩家才能使用摆摊功能。
2. 全息显示 (Hologram)
显示内容：
顶部：玩家自定义的 “个性标语”。
中部：循环展示所有上架商品（物品图标 + 名称 + 价格）。
循环机制：全息内容自动轮播，确保所有商品都能被路过玩家看到。
3. 商品与交互
货架容量：支持最多 27 个物品同时上架。
查看商店：其他玩家 Shift + 右键 点击摆摊者。
购买操作：
左键点击：购买 1 个。
右键点击：购买全部（或一组）。
4. 货币系统
支持 Vault (金币 / 经济) 和 NYE (多货币 / 代币) 两种结算方式，玩家上架时可选择。
二、 商铺与营业执照系统（进阶玩法）
1. 营业执照 (Business License)
获取：通过购买或租赁获得。
特权：
降低摆摊税率。
必要条件：只有拥有营业执照的玩家，才能租赁或购买 “商铺”。
2. 商铺租赁与购买
租赁商铺：消耗货币获得一段时间的商铺使用权，税率较低。
购买商铺：消耗大量货币买断永久产权，税率最低。
3. 货架机制 (离线售卖)
离线功能：购买 / 租赁商铺后，玩家无需在线挂机，物品上架至 “货架” 即可自动售卖。
货架耐久度：
时间耐久：按天数计算（如 30 天）。
交易量耐久：按成功售卖的物品数量上限计算（如 1000 个）。
注：耐久耗尽后货架停止工作或损坏，需维修或续费。
4. 税率体系 (Tax System)
流动摊位（无证）：税率最高（例如 15%）。
流动摊位（持证）：税率中等（例如 8%）。
租赁商铺：税率较低（例如 3%）。
购买商铺：税率极低（例如 1%）。
三、 市场数据与社交系统
1. 价格查询 (Market Price)
触发场景：
玩家上架物品时，系统自动弹出该物品价格查询界面。
玩家手持物品，输入指令 /price 主动查询。
玩家打开背包，鼠标悬浮在物品上按快捷键（如 Ctrl+P）快速查询。
显示内容：该物品在服务器内的近 10 次成交记录，包含每次交易的时间、成交价格、交易货币类型。
2. 求购系统 (Buy Requests)
发布：玩家可发布求购信息（物品、期望价格、数量）。
查看权限：
默认：所有玩家可见。
配置项：可设置为 “仅拥有营业执照的玩家可见”。
接单：卖家可查看求购列表，主动联系或直接对接交易。
四、 拓展功能（营销）
1. 全服交易市场 (Global Market)
功能：一个类似拍卖行的 GUI 界面，实时同步全服所有营业中的商铺数据。
操作：玩家搜索物品 -> 系统列出全服最低价 -> 点击购买 -> 物品通过邮件送达。
2. 竞价广告牌 (Billboard)
功能：主城设置大型全息广告牌。
机制：玩家消耗货币竞拍广告展示时长。
效果：全息显示商品广告，点击可直接购买或传送至店铺。
五、 资产与竞争（深度玩法）
1. 商铺资产化
转卖 / 转租：已购买的商铺可在系统内挂牌转卖给其他玩家；闲置商铺可转租。
装修与扩建：玩家可购买 “店铺皮肤” 改变外观，或消耗材料扩建货架容量（如从 27 格扩至 54 格）。
2. 商业竞争
价格监控：上架时系统提示全服最低价，玩家可开启 “自动调价”，保持价格比对手低 1%。
3. 市场情报 (奸商必备)
成交价格查询：玩家上架物品时，或在某种情况（如手持查询）下，可以查询到此物品近十次成交价格。
